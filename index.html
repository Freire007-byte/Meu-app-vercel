<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-[#0a0a0a] text-white font-mono flex items-center justify-center min-h-screen">
    <div class="p-10 bg-[#111] rounded-[40px] border border-zinc-800 shadow-2xl w-full max-w-sm text-center">
        <div class="flex justify-between items-center mb-10">
            <span class="text-[10px] bg-blue-500/10 text-blue-500 px-3 py-1 rounded-full border border-blue-500/20 font-bold uppercase">Gemini AI Active</span>
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        </div>
        <h1 class="text-xs text-zinc-500 mb-2 uppercase tracking-widest">BTC / USDT</h1>
        <div id="preco" class="text-4xl font-black mb-10 tracking-tighter text-blue-500 font-mono">Conectando...</div>
        <div class="grid grid-cols-2 gap-4 text-[10px] text-zinc-600">
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800/50 text-left"><p>STATUS</p><p id="status" class="text-zinc-300 font-bold uppercase">Online</p></div>
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800/50 text-left"><p>ESTRATÉGIA</p><p class="text-green-500 font-bold uppercase">Scalper 24h</p></div>
        </div>
    </div>
    <script>
        async function atualizar() {
            try {
                // Tentativa 1: Rota direta
                let r = await fetch("/api");
                if (!r.ok) r = await fetch("/api/index"); // Tentativa 2: Rota de pasta
                
                const d = await r.json();
                if (d.btc_price) {
                    document.getElementById("preco").innerText = "$" + d.btc_price.toLocaleString();
                    document.getElementById("status").innerText = "Monitorando";
                }
            } catch (e) { document.getElementById("preco").innerText = "Erro Rede"; }
        }
        setInterval(atualizar, 3000);
        atualizar();
    </script>
</body>
</html>
