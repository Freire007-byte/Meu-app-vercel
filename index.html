<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">
    <div class="p-8 bg-zinc-900 rounded-3xl border border-zinc-800 shadow-2xl text-center w-80">
        <h1 class="text-zinc-500 text-xs uppercase tracking-[0.2em] mb-4">Bitcoin Live</h1>
        <div id="preco" class="text-4xl font-mono font-bold text-green-400 mb-2">$--.---</div>
        <div id="status" class="text-[10px] text-zinc-600 uppercase">Sincronizando...</div>
    </div>

    <script>
        async function atualizar() {
            try {
                const res = await fetch("/api");
                const data = await res.json();
                document.getElementById("preco").innerText = "$" + data.btc_price.toLocaleString();
                document.getElementById("status").innerText = "Última atualização: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById("status").innerText = "Erro de conexão";
            }
        }
        setInterval(atualizar, 10000); // Atualiza a tela a cada 10 segundos
        atualizar();
    </script>
</body>
</html>
