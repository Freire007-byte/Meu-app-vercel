<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gemini AI Trader</title>
</head>
<body class="bg-black text-white font-mono flex items-center justify-center min-h-screen">
    <div class="p-8 border border-zinc-800 rounded-3xl bg-zinc-900/50 w-full max-w-xs text-center">
        <div class="flex justify-between items-center mb-6">
            <span class="text-[10px] text-blue-500 border border-blue-500/30 px-2 py-0.5 rounded-full">AI OPERATOR</span>
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
        </div>
        <h1 id="status" class="text-xs text-zinc-500 uppercase tracking-widest mb-2">Conectando...</h1>
        <div id="preco" class="text-4xl font-bold mb-6 tracking-tighter text-blue-500">$--.---</div>
        <div class="text-[10px] text-zinc-600 bg-black/40 p-3 rounded-xl border border-zinc-800/50">
            ÚLTIMA ANÁLISE: <span id="time" class="text-zinc-400">AGUARDANDO...</span>
        </div>
    </div>

    <script>
        async function atualizar() {
            try {
                const res = await fetch("/api");
                const data = await res.json();
                document.getElementById("preco").innerText = "$" + data.btc_price.toLocaleString();
                document.getElementById("status").innerText = data.status || "MONITORANDO";
                document.getElementById("time").innerText = new Date(data.time).toLocaleTimeString();
            } catch (e) {
                document.getElementById("status").innerText = "ERRO DE CONEXÃO";
            }
        }
        setInterval(atualizar, 10000);
        atualizar();
    </script>
</body>
</html>
