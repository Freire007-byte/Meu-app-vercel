<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">
    <div class="p-10 border border-zinc-800 rounded-3xl text-center">
        <h1 class="text-blue-500 font-bold mb-4">GEMINI TRADER AI</h1>
        <div id="p" class="text-4xl">Carregando...</div>
    </div>
    <script>
        setInterval(async () => {
            const r = await fetch("/api");
            const d = await r.json();
            document.getElementById("p").innerText = "$" + d.btc_price;
        }, 5000);
    </script>
</body>
</html>
